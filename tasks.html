<body>

    <nav class="navbar">
    <a href="./index.html" class="nav-logo">DearMom 💖</a>
    
    <button class="hamburger-btn" id="hamburgerBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>

    <ul class="nav-links" id="navLinks">
        <li><a href="./index.html">Home</a></li>
        <li><a href="./mood.html">Mood Tracker</a></li>
        <li><a href="./tasks.html">Couple Tasks</a></li>

    <main class="main-content">
        <div class="tasks-container">
            <h1 style="color: #e15d97; font-size: 2rem; text-align: center;">Couple Challenges</h1>
            
            <section class="tasks-section" id="todays-tasks">
                <h2 class="card-title">Today's Connection Goals</h2>
                <ul class="task-list">
                    <li>
                        <input type="checkbox" id="challenge1">
                        <label for="challenge1">Share one thing you're excited about</label>
                    </li>
                    <li>
                        <input type="checkbox" id="challenge2">
                        <label for="challenge2">Give each other a 20-second hug</label>
                    </li>
                    <li>
                        <input type="checkbox" id="challenge3">
                        <label for="challenge3">Drink a glass of water at the same time</label>
                    </li>
                     <li>
                        <input type="checkbox" id="challenge4">
                        <label for="challenge4">Put your phones away for 30 minutes</label>
                    </li>
                </ul>
                
                <p style="margin-top: 1.5rem; font-weight: 500;">Today's Progress:</p>
                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progressBarFill">0%</div>
                </div>
            </section>
        </div>
    </main>

    <script src="./js/main.js"></script>
</body>
</html>
